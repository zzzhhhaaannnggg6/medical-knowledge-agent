services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      TEXTBOOK_DIR: "/textbooks"
    volumes:
      - type: bind
        source: "${TEXTBOOK_DIR:-./textbooks}"
        target: "/textbooks"
        read_only: true
      - backend-data:/app/backend/data

  frontend:
    image: node:22-slim
    working_dir: /app/frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE: "${VITE_API_BASE:-http://localhost:8001}"
    volumes:
      - ./frontend:/app/frontend
      - frontend-node-modules:/app/frontend/node_modules
    command: sh -lc "npm ci && npm run dev -- --port 5173"

volumes:
  backend-data:
  frontend-node-modules:
